name: Trova
options:
  bundleIdPrefix: com.trova
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  TrovaCore:
    path: ".."          # depo kökündeki SwiftPM paketi (çekirdek motor)

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_CFBundleDisplayName: Trova
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    # Sandbox KAPALI: ~/Library/Mail (TCC korumalı) ancak non-sandboxed + Full Disk
    # Access ile okunabilir. App Store dağıtımı bu mimaride mümkün değildir.
    ENABLE_APP_SANDBOX: "NO"
    CODE_SIGN_STYLE: Automatic

targets:
  Trova:
    type: application
    platform: macOS
    sources:
      - path: Trova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.trova.Trova
    dependencies:
      - package: TrovaCore
        product: TrovaCore
