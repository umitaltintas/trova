<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Derin indigo gece zemini (Indigo Console temasıyla köprü) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252158" />
      <stop offset="1" stop-color="#12102B" />
    </linearGradient>

    <!-- Bulunan düğüm: amber çekirdek → mercan kenar -->
    <radialGradient id="found" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#FFE6A8" />
      <stop offset="0.35" stop-color="#FFC24D" />
      <stop offset="0.75" stop-color="#FF8A3D" />
      <stop offset="1" stop-color="#F0563C" />
    </radialGradient>

    <!-- Sönük düğümler -->
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#AEB2EE" />
      <stop offset="1" stop-color="#7C80D6" />
    </radialGradient>

    <!-- Sıcak ışıltı (specular değil; standalone önizleme için) -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF9A4D" stop-opacity="0.55" />
      <stop offset="0.6" stop-color="#FF7A45" stop-opacity="0.18" />
      <stop offset="1" stop-color="#FF7A45" stop-opacity="0" />
    </radialGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <!-- Squircle zemin (macOS 26 formuna yakın) -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)" />

  <!-- üstten gelen hafif soğuk ışık -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232"
        fill="#FFFFFF" opacity="0.03" />

  <!-- Kenarlar (thread bağlantıları) -->
  <g stroke="#6E72C8" stroke-width="6" stroke-linecap="round" opacity="0.45" fill="none">
    <line x1="512" y1="470" x2="326" y2="322" />
    <line x1="512" y1="470" x2="704" y2="300" />
    <line x1="512" y1="470" x2="742" y2="566" />
    <line x1="512" y1="470" x2="372" y2="648" />
    <line x1="326" y1="322" x2="262" y2="506" />
    <line x1="372" y1="648" x2="566" y2="710" />
    <line x1="566" y1="710" x2="742" y2="566" />
  </g>

  <!-- Sönük düğümler (mesajlar) -->
  <g>
    <circle cx="326" cy="322" r="30" fill="url(#node)" />
    <circle cx="704" cy="300" r="34" fill="url(#node)" />
    <circle cx="742" cy="566" r="27" fill="url(#node)" />
    <circle cx="372" cy="648" r="31" fill="url(#node)" />
    <circle cx="566" cy="710" r="25" fill="url(#node)" />
    <circle cx="262" cy="506" r="23" fill="url(#node)" />
  </g>

  <!-- Bulunan düğüm: ışıltı + parlak çekirdek -->
  <circle cx="512" cy="470" r="190" fill="url(#halo)" filter="url(#soft)" />
  <circle cx="512" cy="470" r="92" fill="url(#found)" />
  <circle cx="486" cy="442" r="30" fill="#FFFFFF" opacity="0.5" filter="url(#soft)" />
</svg>
