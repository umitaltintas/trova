<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Krem / kırık-beyaz zemin ("cihazında, özel, insani" — Tailscale tonu) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F4ED" />
      <stop offset="1" stop-color="#EAE4D5" />
    </linearGradient>
    <radialGradient id="found" cx="0.42" cy="0.38" r="0.75">
      <stop offset="0" stop-color="#FFE6A8" />
      <stop offset="0.35" stop-color="#FFC24D" />
      <stop offset="0.75" stop-color="#FF8A3D" />
      <stop offset="1" stop-color="#EF5535" />
    </radialGradient>
    <radialGradient id="node" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#454078" />
      <stop offset="1" stop-color="#2E2A57" />
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF9A4D" stop-opacity="0.40" />
      <stop offset="0.6" stop-color="#FF7A45" stop-opacity="0.12" />
      <stop offset="1" stop-color="#FF7A45" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)" />

  <g stroke="#3A3568" stroke-width="6" stroke-linecap="round" opacity="0.32" fill="none">
    <line x1="512" y1="470" x2="326" y2="322" />
    <line x1="512" y1="470" x2="704" y2="300" />
    <line x1="512" y1="470" x2="742" y2="566" />
    <line x1="512" y1="470" x2="372" y2="648" />
    <line x1="326" y1="322" x2="262" y2="506" />
    <line x1="372" y1="648" x2="566" y2="710" />
    <line x1="566" y1="710" x2="742" y2="566" />
  </g>

  <g>
    <circle cx="326" cy="322" r="30" fill="url(#node)" />
    <circle cx="704" cy="300" r="34" fill="url(#node)" />
    <circle cx="742" cy="566" r="27" fill="url(#node)" />
    <circle cx="372" cy="648" r="31" fill="url(#node)" />
    <circle cx="566" cy="710" r="25" fill="url(#node)" />
    <circle cx="262" cy="506" r="23" fill="url(#node)" />
  </g>

  <circle cx="512" cy="470" r="190" fill="url(#halo)" filter="url(#soft)" />
  <circle cx="512" cy="470" r="92" fill="url(#found)" />
  <circle cx="486" cy="442" r="30" fill="#FFFFFF" opacity="0.55" filter="url(#soft)" />
